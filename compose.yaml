services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gamenight_bingo}
      POSTGRES_USER: ${POSTGRES_USER:-gamenight_bingo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gamenight_bingo}
    ports:
      - host_ip: 127.0.0.1
        published: "${POSTGRES_HOST_PORT:-5432}"
        target: 5432
        protocol: tcp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    profiles:
      - redis
    ports:
      - host_ip: 127.0.0.1
        published: "${REDIS_HOST_PORT:-6379}"
        target: 6379
        protocol: tcp
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
